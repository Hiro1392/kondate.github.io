<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>マイECサイト</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">MyShop</div>
      <input type="text" class="search-box" placeholder="商品を検索" />
      <div class="nav-links">
        <a href="#">ログイン</a>
        <a href="#">カート</a>
      </div>
    </header>

    <main class="product-list">
      <div class="product-card">
        <img src="https://via.placeholder.com/150" alt="商品画像" />
        <h2 class="product-title">商品名A</h2>
        <p class="product-price">¥1,980</p>
        <button class="buy-button">カートに追加</button>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/150" alt="商品画像" />
        <h2 class="product-title">商品名B</h2>
        <p class="product-price">¥3,280</p>
        <button class="buy-button">カートに入れる</button>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/150" alt="商品画像" />
        <h2 class="product-title">商品名C</h2>
        <p class="product-price">¥4,980</p>
        <button class="buy-button">カートに追加</button>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2025 MyShop. All rights reserved.</p>
    </footer>
  </body>
</html>
